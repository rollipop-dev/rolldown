name: Publish to NPM

permissions: {}

on:
  push:
    branches:
      - rollipop
    paths:
      - packages/rolldown/package.json
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: taiki-e/checkout-action@83ed61bfbe2b8abbb3c66e8b65b1335484c70009 # v1.4.1

      - name: Check version changes
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/@rollipop/rolldown@latest/package.json
          file-name: packages/rolldown/package.json

      - name: Print version
        if: steps.version.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Version change found! New version: ${NEW_VERSION}"

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: Build bindings and node packages
    uses: ./.github/workflows/reusable-release-build.yml

  publish:
    needs: [check, build]
    if: github.repository == 'leegeunhyeok/rolldown'
    name: Publish npm Packages
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for `npm publish --provenance`
      contents: write # for `git push`
    steps:
      - uses: taiki-e/checkout-action@83ed61bfbe2b8abbb3c66e8b65b1335484c70009 # v1.4.1

      - uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          cache: true

      - name: Git Reset Hard
        run: git reset --hard # fix pnpm install add new line for package.json

      - name: Download Binding Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/artifacts

      - name: Create rolldown/npm dirs
        run: vp exec --filter '@rollipop/rolldown' napi create-npm-dirs

      - name: Move Binding Artifacts
        run: vp run --filter '@rollipop/rolldown' artifacts

      - name: List Rolldown Bindings
        run: ls -R ./packages/rolldown/npm
        shell: bash

      - name: Download Node Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/dist
          name: node-artifact

      - name: Download `@rolldown/debug` Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/debug/dist
          name: debug-artifact

      - name: Download Pluginutils Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/pluginutils/dist
          name: pluginutils-artifact

      - name: Copy Licenses
        run: |
          find ./packages/ -type d -maxdepth 1 -exec cp LICENSE {} \;
          find ./packages/ -type d -maxdepth 1 -exec cp THIRD-PARTY-LICENSE {} \;

      - name: Publish(Dry Run)
        run: |
          vp pm publish -r --tag latest --dry-run --no-git-checks --filter '!@rolldown/browser'

      - name: Publish
        run: |
          npm install -g npm
          vp pm publish -r --tag latest --no-git-checks --filter '!@rolldown/browser'

      - name: Create Git Tag
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/leegeunhyeok/rolldown.git
          git tag v${{ needs.check.outputs.version }}
          git push origin v${{ needs.check.outputs.version }}
